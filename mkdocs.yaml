site_name: transpiler-mate
site_url: https://terradue.github.io/transpiler-mate/
site_author: Fabrice Brito, Simone Tripodi
repo_url: https://github.com/Terradue/transpiler-mate/
repo_name: Terradue/transpiler-mate

theme:
    logo: imgs/icon-eoap.png
    name: material

    palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search
  - mermaid2:
      version: 11.4.1
  - mkdocs-jupyter:
      execute: true
      show_input: True
      no_input: False

markdown_extensions:
  - pymdownx.details
  - abbr
  - admonition
  - footnotes
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - attr_list
  - pymdownx.snippets:
      base_path: './'
  - pymdownx.highlight:
      line_spans: __span

extra_css:
  - styles/css/app.css
  
extra_javascript:
  - javascripts/config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tutorials:
    - Overview: tutorials/index.md
  - How-to guides:
    - Overview: how-to-guides/index.md
    - Create CWL metadata with the generator: how-to-guides/metadata-generator.html
    - Generate CodeMeta: how-to-guides/generate-codemeta.md
    - Generate DataCite metadata: how-to-guides/generate-datacite.md
    - Generate an OGC API - Record: how-to-guides/generate-ogc-record.md
    - Generate an OGC API - Processes descriptor: how-to-guides/generate-ogc-processes.md
    - Generate OCI annotations: how-to-guides/generate-oci-annotations.md
    - Generate Markdown workflow documentation: how-to-guides/generate-markdown.md
    - Publish to InvenioRDM: how-to-guides/publish-to-invenio.md
    - Bump a CWL software version: how-to-guides/bump-version.md
  - Reference:
    - Overview: reference/index.md
    - JSON Schemas:
      - Overview: reference/schemas/index.md
      - DataCite 4.6: reference/schemas/datacite_4_6.md
      - OGC API - Records: reference/schemas/ogcapi_records.md
      - Schema.org/SoftwareApplication: reference/schemas/software_application.md
      - OCI Annotations: reference/schemas/oci_annotations.md
    - Crosswalks:
      - Overview: reference/crosswalks/index.md
      - CodeMeta: reference/crosswalks/codemeta.md
      - DataCite: reference/crosswalks/datacite.md
      - OCI annotations: reference/crosswalks/oci-annotations.md
      - OGC API - Processes: reference/crosswalks/ogc-processes.md
      - OGC API - Records: reference/crosswalks/ogc-record.md
      - InvenioRDM: reference/crosswalks/invenio.md
    - Python API: reference/api.md
  - Explanation:
    - Overview: explanation/index.md
    - CWL metadata code conventions: explanation/cwl-metadata-conventions.md

