version: '3'

includes:
  json: https://raw.githubusercontent.com/Terradue/taskfile-utils/refs/heads/main/json.yaml
  quality: https://raw.githubusercontent.com/Terradue/taskfile-utils/refs/heads/main/quality.yaml

tasks:

  generate_jsonschema_doc:
    cmds:
    - task: json:generate_schema_doc
      vars:
        SOURCE: './schemas'
        TARGET: './docs/schemas'

  process_datacite:
    cmds:
    - task: json:create_models
      vars:
        SCHEMA: './schemas/datacite_4_6.yaml'
        BASE_CLASS: 'transpiler_mate.TranspilerBaseModel'
        ADDITIONAL_IMPORTS: 'pydantic.AliasChoices,typing.Any,transpiler_mate.TranspilerBaseModel'
        OUTPUT: './src/transpiler_mate/datacite/datacite_4_6_models.py'

  process_schemaorg:
    cmds:
    - task: json:create_models
      vars:
        SCHEMA: './schemas/software_application.yaml'
        BASE_CLASS: 'transpiler_mate.TranspilerBaseModel'
        ADDITIONAL_IMPORTS: 'pydantic.AliasChoices,typing.Any,transpiler_mate.TranspilerBaseModel'
        CUSTOM_TEMPLATE_DIR: './templates'
        OUTPUT: './src/transpiler_mate/metadata/software_application_models.py'

  process_ogcrecord:
    cmds:
    - task: json:create_models
      vars:
        SCHEMA: './schemas/ogcapi_records.yaml'
        BASE_CLASS: 'transpiler_mate.TranspilerBaseModel'
        ADDITIONAL_IMPORTS: 'pydantic.AliasChoices,typing.Any,transpiler_mate.TranspilerBaseModel'
        OUTPUT: './src/transpiler_mate/ogcapi_records/ogcapi_records_models.py'

  process_oci_annotations:
    cmds:
    - task: json:create_models
      vars:
        SCHEMA: './schemas/oci_annotations.yaml'
        BASE_CLASS: 'transpiler_mate.TranspilerBaseModel'
        ADDITIONAL_IMPORTS: 'pydantic.AliasChoices,typing.Any,transpiler_mate.TranspilerBaseModel'
        OUTPUT: './src/transpiler_mate/oci/oci_annotations_models.py'

  download_licenses_index:
    cmds:
    - |
      echo "# Transpiler Mate (c) 2025
      # Copyright 2026 Terradue
      #
      # Licensed under the Apache License, Version 2.0 (the "License");
      # you may not use this file except in compliance with the License.
      # You may obtain a copy of the License at
      #
      #     http://www.apache.org/licenses/LICENSE-2.0
      #
      # Unless required by applicable law or agreed to in writing, software
      # distributed under the License is distributed on an "AS IS" BASIS,
      # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
      # See the License for the specific language governing permissions and
      # limitations under the License.

      from __future__ import annotations

      from .software_application_models import CreativeWork
      from pydantic import AnyUrl
      from typing import Mapping
      
      LICENSES_INDEX: Mapping[str, CreativeWork] = {" > ./src/transpiler_mate/metadata/licenses.py
    - |
      curl -s https://raw.githubusercontent.com/spdx/license-list-data/refs/heads/main/json/licenses.json \
      | jq -r --arg sq "'" '.licenses[] |
      "  \($sq)\(.licenseId)\($sq): CreativeWork(
          identifier=\($sq)\(.licenseId)\($sq),
          name=\($sq)\(.name | gsub($sq; "\u005C\u0027"))\($sq),
          url=AnyUrl(\($sq)\((.seeAlso[0] // .reference // ""))\($sq))
        ), # type: ignore",
      "  \($sq)https://spdx.org/licenses/\(.licenseId)\($sq): CreativeWork(
          identifier=\($sq)\(.licenseId)\($sq),
          name=\($sq)\(.name | gsub($sq; "\u005C\u0027"))\($sq),
          url=AnyUrl(\($sq)\((.seeAlso[0] // .reference // ""))\($sq))
        ), # type: ignore",
      "  \($sq)https://spdx.org/licenses/\(.licenseId).html\($sq): CreativeWork(
          identifier=\($sq)\(.licenseId)\($sq),
          name=\($sq)\(.name | gsub($sq; "\u005C\u0027"))\($sq),
          url=AnyUrl(\($sq)\((.seeAlso[0] // .reference // ""))\($sq))
        ), # type: ignore",
      "  \($sq)\((.seeAlso[0] // .reference // ""))\($sq): CreativeWork(
          identifier=\($sq)\(.licenseId)\($sq),
          name=\($sq)\(.name | gsub($sq; "\u005C\u0027"))\($sq),
          url=AnyUrl(\($sq)\((.seeAlso[0] // .reference // ""))\($sq))
        ), # type: ignore"' \
      >> ./src/transpiler_mate/metadata/licenses.py
    - echo "}" >> ./src/transpiler_mate/metadata/licenses.py

  download_science_keywords_index:
    vars:
      TARGET: './src/transpiler_mate/ogc_record/sciencekeywords.py'
    cmds:
    - |
      echo "# Transpiler Mate (c) 2025
      # 
      # Transpiler Mate is licensed under
      # Creative Commons Attribution-ShareAlike 4.0 International.
      # 
      # You should have received a copy of the license along with this work.
      # If not, see <https://creativecommons.org/licenses/by-sa/4.0/>.

      from pydantic import (
        AnyUrl,
        BaseModel,
        computed_field
      )
      from typing import (
        Mapping,
        Optional,
        Sequence
      )
      
      class ScienceKeywordRecord(BaseModel):
        @computed_field
        @property
        def scheme(self) -> str:
            return 'GCMD Science Keywords'
        category: str
        topic: Optional[str] = None
        term: Optional[str] = None
        variable_level_1: Optional[str] = None
        variable_level_2: Optional[str] = None
        variable_level_3: Optional[str] = None
        detailed_variable: Optional[str] = None
        identifier: str
        @computed_field
        @property
        def uri(self) -> AnyUrl:
            return AnyUrl(f'https://cmr.earthdata.nasa.gov/kms/concept/{self.identifier}')
        @computed_field
        @property
        def hierarchy_list(self) -> Sequence[str]:
            hierarchy = [self.category]

            def _add(keyword: str | None):
                if keyword:
                    hierarchy.append(keyword)

            _add(self.topic)
            _add(self.term)
            _add(self.variable_level_1)
            _add(self.variable_level_2)
            _add(self.variable_level_3)
            _add(self.detailed_variable)

            return hierarchy

      KEYWORDS_INDEX: Mapping[str, ScienceKeywordRecord] = {" > {{.TARGET}}
    - |
      curl -s --location "https://gcmd.earthdata.nasa.gov/kms/concepts/concept_scheme/sciencekeywords?format=csv" \
      | tail -n +2 \
      | mlr --icsv --ojson cat \
      | jq -r --arg sq "'" '.[] |
      "  \($sq)\(.UUID)\($sq): ScienceKeywordRecord(
          category=\($sq)\(.Category)\($sq),
          topic=\($sq)\(.Topic)\($sq),
          term=\($sq)\(.Term)\($sq),
          variable_level_1=\($sq)\(.Variable_Level_1)\($sq),
          variable_level_2=\($sq)\(.Variable_Level_2)\($sq),
          variable_level_3=\($sq)\(.Variable_Level_3)\($sq),
          detailed_variable=\($sq)\(.Detailed_Variable)\($sq),
          identifier=\($sq)\(.UUID)\($sq)
        ),"' >> {{.TARGET}}
    - echo "}" >> {{.TARGET}}

  default:
    cmds:
    - task: json:generate_jsonschema_doc
    - task: process_datacite
    - task: process_schemaorg
    - task: process_oci_annotations
    - task: download_licenses_index
    - task: download_science_keywords_index
