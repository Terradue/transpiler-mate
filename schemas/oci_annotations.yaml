$schema: https://json-schema.org/draft/2020-12/schema
$id: https://oras.land/docs/how_to_guides/manifest_annotations/
$ref: '#/$defs/OciAnnotations'

$defs:

  OciAnnotations:
    type: object
    properties:
      org.opencontainers.image.title:
        type: string
      org.opencontainers.image.description:
        type: string
      org.opencontainers.image.version:
        type: string
      org.opencontainers.image.source:
        type: string
      org.opencontainers.image.revision:
        type: string
      org.opencontainers.image.created:
        oneOf:
        - type: string
          format: date
        - type: string
          format: date-time
      org.opencontainers.image.licenses:
        type: string
      org.cwl.entrypoint:
        type: string
      org.cwl.spec:
        type: string
      org.cwl.type:
        type: string
